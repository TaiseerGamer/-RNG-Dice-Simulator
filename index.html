<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RNG Dice Simulator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎲 RNG Dice Simulator</h1>

    <div id="coins">Coins: 0</div>

    <div id="stats"></div>

    <div id="dice">🎲</div>

    <div id="result">
        Click the dice to roll!
    </div>

    <div class="shop">

        <div class="upgrade">
            <h3>Luck Upgrade</h3>

            <p>
                Increase chances of rare rewards
            </p>

            <button onclick="buyLuck()">
                Buy (100 coins)
            </button>
        </div>

        <div class="upgrade">
            <h3>Coin Boost</h3>

            <p>
                Increase coin rewards
            </p>

            <button onclick="buyCoinBoost()">
                Buy (150 coins)
            </button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
